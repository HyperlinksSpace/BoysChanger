name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject repository metadata
        shell: bash
        run: |
          REPO="${{ github.repository }}"
          OWNER="${{ github.repository_owner }}"
          NAME="${{ github.event.repository.name }}"
          sed -i "s|__GITHUB_REPO__|${REPO}|g" site/index.html site/app.js
          sed -i "s|__GITHUB_OWNER__|${OWNER}|g" site/index.html site/app.js
          sed -i "s|__GITHUB_NAME__|${NAME}|g" site/index.html site/app.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
